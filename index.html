<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solaris LATAM</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
font-size:70px;
margin-top:80px;
color:#FFD700;
text-shadow:0 0 25px #FFD700;
}

.subtitle{
font-size:22px;
opacity:0.8;
}

.server-box{
margin-top:40px;
font-size:25px;
}

button{
padding:15px 35px;
margin:10px;
font-size:18px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ffaa00,#ff7700);
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 4s infinite;
}

@keyframes twinkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

.block{
position:absolute;
width:70px;
animation:float 6s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-30px)}
100%{transform:translateY(0)}
}

.section{
margin-top:80px;
}

.card{
display:inline-block;
background:#0f172a;
padding:30px;
margin:20px;
border-radius:15px;
width:200px;
}

</style>
</head>

<body>

<h1>☀️ SOLARIS LATAM</h1>
<p class="subtitle">Servidor Survival Latino</p>

<div class="server-box">

📡 IP: <b>solarislatammc.falixsrv.me</b>

<br><br>

<button onclick="copyIP()">Copiar IP</button>
<button onclick="checkServer()">Ver jugadores</button>

<h2 id="players"></h2>

</div>

<div class="section">

<h2>🎮 Conectar</h2>

<button onclick="copyIP()">Java Edition</button>
<button onclick="copyIP()">Bedrock Edition</button>

</div>

<div class="section">

<h2>📊 Estadísticas</h2>

<div class="card">
<h3>Jugadores</h3>
<p id="statPlayers">--</p>
</div>

<div class="card">
<h3>Estado</h3>
<p id="statStatus">--</p>
</div>

</div>

<div class="section">

<h2>🏆 Ranking</h2>
<p>Próximamente ranking automático</p>

</div>

<script>

function copyIP(){
navigator.clipboard.writeText("solarislatammc.falixsrv.me");
alert("IP copiada");
}

async function checkServer(){

let res = await fetch("https://api.mcsrvstat.us/2/solarislatammc.falixsrv.me");
let data = await res.json();

if(data.online){

document.getElementById("players").innerText =
"🟢 "+data.players.online+" jugadores online";

document.getElementById("statPlayers").innerText =
data.players.online;

document.getElementById("statStatus").innerText =
"Online";

}else{

document.getElementById("players").innerText =
"🔴 Servidor Offline";

document.getElementById("statStatus").innerText =
"Offline";

}

}

for(let i=0;i<120;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
document.body.appendChild(star);
}

</script>

</body>
</html>
